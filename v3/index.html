  margin: 0 auto;
  padding: 14px 18px 0;
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.steps-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: var(--text-caption);
}
.steps-label {
  font-weight: 600;
  color: var(--text-strong);
}
.steps-count {
  color: var(--text-muted);
  font-family: var(--font-mono);
}
.steps-track {
  height: 3px;
  border-radius: var(--radius-pill);
  background: var(--surface-sunken);
  overflow: hidden;
}
.steps-fill {
  height: 100%;
  border-radius: var(--radius-pill);
  background: var(--grid-blue);
  transition: width 280ms var(--ease-out);
}

/* surfaces */
.card {
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-lg);
  background: var(--surface-card);
  padding: 20px;
}
.eyebrow {
  font-size: var(--text-overline);
  letter-spacing: 0.01em;
  font-weight: 600;
  color: var(--text-muted);
}
.muted {
  color: var(--text-muted);
}
.lead {
  font-size: var(--text-body-lg);
  line-height: 1.5;
  color: var(--text-body);
  margin: 0;
}

/* buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: var(--font-sans);
  font-weight: 600;
  border-radius: var(--radius-md);
  border: 1px solid transparent;
  cursor: pointer;
  transition:
    background 120ms,
    border-color 120ms;
}
.btn-md {
  font-size: var(--text-body-sm);
  padding: 11px 17px;
}
.btn-lg {
  font-size: var(--text-base);
  padding: 13px 20px;
}
.btn-full {
  width: 100%;
}
.btn-primary {
  background: var(--action-primary);
  color: var(--white);
}
.btn-primary:hover {
  background: var(--action-primary-hover);
}
.btn-secondary {
  background: var(--surface-card);
  color: var(--ink);
  border-color: var(--border-strong);
}
.btn-secondary:hover {
  background: var(--surface-sunken);
}
.btn-ghost {
  background: none;
  border: none;
  color: var(--text-link);
  font-weight: 600;
  cursor: pointer;
  padding: 0;
}
.btn:disabled {
  background: var(--surface-sunken);
  color: var(--text-muted);
  cursor: not-allowed;
  border-color: var(--border-soft);
}

/* badge */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 9px;
  border-radius: var(--radius-pill);
  font-size: var(--text-overline);
  font-weight: 600;
  line-height: 1.5;
  white-space: nowrap;
}

/* callout */
.callout {
  display: flex;
  gap: 11px;
  padding: 13px 15px;
  border: 1px solid;
  border-radius: var(--radius-md);
}
.callout-icon {
  display: flex;
  align-items: center;
  flex-shrink: 0;
  /* Centre the icon on the title's first line instead of top-aligning it. */
  min-height: calc(var(--text-body-sm) * 1.45);
}
.callout-title {
  font-size: var(--text-body-sm);
  font-weight: 700;
  line-height: 1.45;
}
.callout-body {
  font-size: var(--text-body-sm);
  color: var(--text-body);
  line-height: 1.45;
}

/* savings figure */
.figure {
  display: flex;
  flex-direction: column;
  gap: 3px;
  min-width: 120px;
}
.figure-label {
  font-size: var(--text-caption);
  color: var(--text-muted);
  font-weight: 500;
}
.figure-amount {
  font-family: var(--font-mono);
  font-size: var(--text-data-lg);
  font-weight: 600;
  line-height: 1.1;
}
.figure-period {
  font-size: var(--text-caption);
  color: var(--text-muted);
  font-family: var(--font-mono);
}
.figure-caption {
  font-size: var(--text-overline);
  color: var(--text-muted);
}

/* cost calculation receipt (results headline) */
.calc {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.calc-inputs {
  display: flex;
  flex-direction: column;
  gap: 9px;
  /* Share the result band's horizontal inset so input amounts and the result
     amount line up on one right edge (and the operators on one left edge). */
  padding: 0 15px;
}
.calc-line {
  display: flex;
  align-items: center;
  gap: 12px;
}
.calc-op {
  flex: none;
  width: 16px;
  text-align: center;
  font-family: var(--font-mono);
  font-size: var(--text-data);
  font-weight: 400;
  color: var(--text-muted);
}
.calc-name {
  font-size: var(--text-base);
  color: var(--text-body);
}
.calc-val {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: var(--text-data-lg);
  font-weight: 600;
  line-height: 1.1;
  color: var(--text-strong);
}
.calc-result {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 15px;
  border-radius: var(--radius-md);
}
.calc-result-name {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.calc-result-label {
  font-size: var(--text-base);
  font-weight: 600;
  color: var(--text-strong);
}
.calc-result-desc {
  font-size: var(--text-caption);
  font-weight: 500;
}
.calc-result-val {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: var(--text-data-xl);
  font-weight: 700;
  line-height: 1;
}
.calc-foot {
  font-size: var(--text-caption);
  color: var(--text-muted);
  font-family: var(--font-mono);
}

/* confidence bar */
.confbar-track {
  height: 8px;
  border-radius: var(--radius-pill);
  background: var(--surface-sunken);
  overflow: hidden;
}
.confbar-fill {
  height: 100%;
  border-radius: var(--radius-pill);
  transition: width 320ms var(--ease-out);
}
.confbar-caption {
  font-size: var(--text-caption);
  color: var(--text-muted);
  line-height: 1.45;
}

/* form: switch + input + textarea */
.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.field-label {
  font-size: var(--text-body-sm);
  font-weight: 600;
  color: var(--text-strong);
}
.field-hint {
  font-size: var(--text-caption);
  color: var(--text-muted);
}
.input,
.textarea {
  font-family: var(--font-sans);
  font-size: var(--text-body-sm);
  color: var(--text-strong);
  background: var(--white);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-md);
  padding: 11px 12px;
  outline: none;
  width: 100%;
}
.input:focus,
.textarea:focus {
  border-color: var(--action-primary);
  box-shadow: var(--focus-ring);
}
.textarea {
  min-height: 68px;
  resize: vertical;
}
.switch {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 14px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  text-align: left;
  width: 100%;
}
.switch-text {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.switch-desc {
  font-size: var(--text-caption);
  color: var(--text-muted);
  line-height: 1.4;
}
.switch-track {
  width: 40px;
  height: 24px;
  border-radius: var(--radius-pill);
  background: var(--border-strong);
  flex-shrink: 0;
  position: relative;
  transition: background 160ms var(--ease-out);
}
.switch[aria-checked='true'] .switch-track {
  background: var(--action-primary);
}
.switch-knob {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--white);
  transition: transform 160ms var(--ease-out);
}
.switch[aria-checked='true'] .switch-knob {
  transform: translateX(16px);
}

/* selectable rows (meters / tariffs / periods) */
.row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  background: var(--surface-card);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-md);
  transition:
    border-color 120ms,
    background 120ms;
}
.row.is-selected {
  background: var(--status-info-bg);
  border-color: var(--action-primary);
}
.row.is-clickable {
  cursor: pointer;
}
.row-tag {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  line-height: 0;
}
.row-main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.row-title {
  font-size: var(--text-base);
  font-weight: 600;
  color: var(--text-strong);
}
.row-sub {
  font-size: var(--text-caption);
  color: var(--text-muted);
  line-height: 1.4;
}
.chevron {
  flex-shrink: 0;
  line-height: 0;
  color: var(--text-muted);
  transition: transform 200ms;
}
.chevron.is-open {
  transform: rotate(90deg);
}

/* drill-down */
.drill {
  border-top: 1px solid var(--border-soft);
  background: var(--surface-sunken);
  padding: 7px;
}
.drill-hint {
  padding: 5px 11px 7px;
  font-size: var(--text-caption);
  font-weight: 600;
  color: var(--text-muted);
}
.day {
  background: var(--surface-card);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  overflow: hidden;
}
.day-head {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 10px 13px;
  cursor: pointer;
}
.day-date {
  flex: 1;
  font-size: var(--text-body-sm);
  font-weight: 600;
  color: var(--text-strong);
}

/* month calendar (period drill-down) */
.cal-month {
  font-size: var(--text-body-sm);
  font-weight: 600;
  color: var(--text-strong);
  margin: 6px 4px 8px;
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}
.cal-weekday {
  text-align: center;
  font-size: var(--text-overline);
  font-weight: 600;
  color: var(--text-muted);
  padding-bottom: 2px;
}
.cal-cell {
  position: relative;
  min-width: 0;
  min-height: 56px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 4px;
  padding: 6px 7px;
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-sm);
  background: transparent;
  font-family: var(--font-sans);
  text-align: left;
  cursor: pointer;
  transition:
    border-color 120ms var(--ease-out),
    box-shadow 120ms var(--ease-out);
}
.cal-cell:hover {
  border-color: var(--border-strong);
}
.cal-cell.is-selected {
  border-color: var(--grid-blue);
  box-shadow: var(--focus-ring);
}
.cal-cell-empty {
  border: none;
  background: transparent;
  min-height: 0;
  cursor: default;
}
.cal-day {
  font-size: var(--text-body-sm);
  font-weight: 600;
  color: var(--text-strong);
  line-height: 1;
}
.cal-cost {
  font-size: 11px;
  color: var(--text-body);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.cal-flag {
  position: absolute;
  top: 7px;
  right: 7px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--status-caution);
}
.cal-detail {
  margin-top: 10px;
}
.cal-detail:empty {
  display: none;
}
.cal-detail-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 2px 2px 10px;
}

.slot-grid-head,
.slot-row {
  display: grid;
  grid-template-columns: auto repeat(3, 1fr);
  gap: 8px;
  padding: 7px 14px;
  align-items: center;
}
.slot-grid-head {
  background: var(--surface-sunken);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--text-muted);
  font-weight: 600;
  white-space: nowrap;
}
.slot-row {
  border-top: 1px solid var(--border-soft);
  background: var(--surface-card);
  font-family: var(--font-mono);
  font-size: var(--text-data-sm);
}
.slot-row > span:first-child {
  white-space: nowrap;
}
.slot-scroll {
  max-height: 320px;
  overflow-y: auto;
}
.slot-flag {
  padding: 0 12px 7px 14px;
  font-size: 11px;
  font-weight: 600;
}
.tnum {
  text-align: right;
}

/* statement table */
.table {
  display: flex;
  flex-direction: column;
  gap: 1px;
  background: var(--border-soft);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-md);
  overflow: hidden;
}
.table-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 15px;
  background: var(--surface-card);
}

/* usage sparkline */
.spark {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 42px;
}
.spark-bar {
  flex: 1;
  border-radius: 1px;
  transform-origin: bottom;
  animation: ae-grow 460ms var(--ease-out) backwards;
}

/* modal */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(8, 12, 16, 0.55);
  z-index: 50;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 20px;
  overflow-y: auto;
}
.modal {
  width: 100%;
  max-width: 580px;
  background: var(--surface-card);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  animation: ae-fade 200ms var(--ease-out);
}
.modal-head,
.modal-foot {
  display: flex;
  gap: 12px;
  padding: 18px 20px;
}
.modal-head {
  align-items: flex-start;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-soft);
}
.modal-body {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-height: calc(100vh - 210px);
  overflow-y: auto;
}
.modal-foot {
  justify-content: flex-end;
  flex-wrap: wrap;
  border-top: 1px solid var(--border-soft);
  background: var(--surface-app);
}

.banner {
  display: flex;
  align-items: flex-start;
  gap: 11px;
  padding: 13px 16px;
  background: var(--surface-inverse);
  color: var(--text-inverse);
  border-radius: var(--radius-md);
}

/* legal / privacy footer */
.app-footer {
  border-top: 1px solid var(--border-soft);
  background: var(--surface-card);
  margin-top: auto;
}
.app-footer-inner {
  max-width: 880px;
  margin: 0 auto;
  padding: 20px 18px 28px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.footer-disclaimer {
  margin: 0;
  font-size: var(--text-caption);
  line-height: 1.5;
  color: var(--text-muted);
}
.footer-disclaimer strong {
  color: var(--text-body);
}
.footer-details {
  font-size: var(--text-caption);
  color: var(--text-muted);
}
.footer-details > summary {
  cursor: pointer;
  font-weight: 600;
  color: var(--text-body);
  list-style: none;
}
.footer-details > summary::-webkit-details-marker {
  display: none;
}
.footer-details > summary::before {
  content: '▸ ';
  color: var(--text-muted);
}
.footer-details[open] > summary::before {
  content: '▾ ';
}
.footer-p {
  margin: 8px 0 0;
  line-height: 1.55;
}
.footer-fine {
  margin: 0;
  font-size: var(--text-overline);
  line-height: 1.5;
  color: var(--text-muted);
}

@media (max-width: 640px) {
  .slot-grid-head,
  .slot-row {
    grid-template-columns: auto repeat(3, 1fr);
    gap: 5px;
    padding: 7px 9px;
  }
  /* 7 columns on a phone are too narrow for a £x.xx figure (it would clip to an
     ellipsis) — drop the per-cell cost and rely on the heat tint + tap-for-detail.
     The day number stays, and the detail panel shows exact kWh + cost. */
  .cal-grid {
    gap: 4px;
  }
  .cal-cell {
    min-height: 46px;
    padding: 5px;
  }
  .cal-cost {
    display: none;
  }
}</style>
</head>
<body>
<div id="app"></div>
</body>
</html>
