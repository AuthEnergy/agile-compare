.row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  background: var(--surface-card);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-md);
  transition:
    border-color 120ms,
    background 120ms;
}
.row.is-selected {
  background: var(--status-info-bg);
  border-color: var(--action-primary);
}
.row.is-clickable {
  cursor: pointer;
}
.row-tag {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  line-height: 0;
}
.row-main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.row-title {
  font-size: var(--text-base);
  font-weight: 600;
  color: var(--text-strong);
}
.row-sub {
  font-size: var(--text-caption);
  color: var(--text-muted);
  line-height: 1.4;
}
.chevron {
  flex-shrink: 0;
  line-height: 0;
  color: var(--text-muted);
  transition: transform 200ms;
}
.chevron.is-open {
  transform: rotate(90deg);
}

/* drill-down */
.drill {
  border-top: 1px solid var(--border-soft);
  background: var(--surface-sunken);
  padding: 7px;
}
.drill-hint {
  padding: 5px 11px 7px;
  font-size: var(--text-caption);
  font-weight: 600;
  color: var(--text-muted);
}
.day {
  background: var(--surface-card);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  overflow: hidden;
}
.day-head {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 10px 13px;
  cursor: pointer;
}
.day-date {
  flex: 1;
  font-size: var(--text-body-sm);
  font-weight: 600;
  color: var(--text-strong);
}

/* month calendar (period drill-down) */
.cal-month {
  font-size: var(--text-body-sm);
  font-weight: 600;
  color: var(--text-strong);
  margin: 6px 4px 8px;
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}
.cal-weekday {
  text-align: center;
  font-size: var(--text-overline);
  font-weight: 600;
  color: var(--text-muted);
  padding-bottom: 2px;
}
.cal-cell {
  position: relative;
  min-width: 0;
  min-height: 56px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 4px;
  padding: 6px 7px;
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-sm);
  background: transparent;
  font-family: var(--font-sans);
  text-align: left;
  cursor: pointer;
  transition:
    border-color 120ms var(--ease-out),
    box-shadow 120ms var(--ease-out);
}
.cal-cell:hover {
  border-color: var(--border-strong);
}
.cal-cell.is-selected {
  border-color: var(--grid-blue);
  box-shadow: var(--focus-ring);
}
.cal-cell-empty {
  border: none;
  background: transparent;
  min-height: 0;
  cursor: default;
}
.cal-day {
  font-size: var(--text-body-sm);
  font-weight: 600;
  color: var(--text-strong);
  line-height: 1;
}
.cal-cost {
  font-size: 11px;
  color: var(--text-body);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.cal-flag {
  position: absolute;
  top: 7px;
  right: 7px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--status-caution);
}
.cal-detail {
  margin-top: 10px;
}
.cal-detail:empty {
  display: none;
}
.cal-detail-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 2px 2px 10px;
}

.slot-grid-head,
.slot-row {
  display: grid;
  grid-template-columns: auto repeat(3, 1fr);
  gap: 8px;
  padding: 7px 14px;
  align-items: center;
}
.slot-grid-head {
  background: var(--surface-sunken);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--text-muted);
  font-weight: 600;
  white-space: nowrap;
}
.slot-row {
  border-top: 1px solid var(--border-soft);
  background: var(--surface-card);
  font-family: var(--font-mono);
  font-size: var(--text-data-sm);
}
.slot-row > span:first-child {
  white-space: nowrap;
}
.slot-scroll {
  max-height: 320px;
  overflow-y: auto;
}
.slot-flag {
  padding: 0 12px 7px 14px;
  font-size: 11px;
  font-weight: 600;
}
.tnum {
  text-align: right;
}

/* statement table */
.table {
  display: flex;
  flex-direction: column;
  gap: 1px;
  background: var(--border-soft);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-md);
  overflow: hidden;
}
.table-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 15px;
  background: var(--surface-card);
}

/* usage sparkline */
.spark {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 42px;
}
.spark-bar {
  flex: 1;
  border-radius: 1px;
  transform-origin: bottom;
  animation: ae-grow 460ms var(--ease-out) backwards;
}

/* modal */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(8, 12, 16, 0.55);
  z-index: 50;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 20px;
  overflow-y: auto;
}
.modal {
  width: 100%;
  max-width: 580px;
  background: var(--surface-card);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  animation: ae-fade 200ms var(--ease-out);
}
.modal-head,
.modal-foot {
  display: flex;
  gap: 12px;
  padding: 18px 20px;
}
.modal-head {
  align-items: flex-start;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-soft);
}
.modal-body {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-height: calc(100vh - 210px);
  overflow-y: auto;
}
.modal-foot {
  justify-content: flex-end;
  flex-wrap: wrap;
  border-top: 1px solid var(--border-soft);
  background: var(--surface-app);
}

.banner {
  display: flex;
  align-items: flex-start;
  gap: 11px;
  padding: 13px 16px;
  background: var(--surface-inverse);
  color: var(--text-inverse);
  border-radius: var(--radius-md);
}

/* legal / privacy footer */
.app-footer {
  border-top: 1px solid var(--border-soft);
  background: var(--surface-card);
  margin-top: auto;
}
.app-footer-inner {
  max-width: 880px;
  margin: 0 auto;
  padding: 20px 18px 28px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.footer-disclaimer {
  margin: 0;
  font-size: var(--text-caption);
  line-height: 1.5;
  color: var(--text-muted);
}
.footer-disclaimer strong {
  color: var(--text-body);
}
.footer-details {
  font-size: var(--text-caption);
  color: var(--text-muted);
}
.footer-details > summary {
  cursor: pointer;
  font-weight: 600;
  color: var(--text-body);
  list-style: none;
}
.footer-details > summary::-webkit-details-marker {
  display: none;
}
.footer-details > summary::before {
  content: '▸ ';
  color: var(--text-muted);
}
.footer-details[open] > summary::before {
  content: '▾ ';
}
.footer-p {
  margin: 8px 0 0;
  line-height: 1.55;
}
.footer-fine {
  margin: 0;
  font-size: var(--text-overline);
  line-height: 1.5;
  color: var(--text-muted);
}

/* Tooltip — singleton <div class="app-tooltip"> appended to <body> by tooltip.ts,
   positioned with fixed so it escapes any overflow:hidden container. */
.app-tooltip {
  position: fixed;
  z-index: 100;
  pointer-events: none;
  background: var(--surface-inverse);
  color: var(--text-inverse);
  padding: 5px 9px;
  border-radius: 5px;
  font-size: var(--text-caption);
  font-weight: 400;
  line-height: 1.4;
  max-width: 220px;
  word-break: break-word;
  opacity: 0;
  transition: opacity 120ms;
}

@media (max-width: 640px) {
  .slot-grid-head,
  .slot-row {
    grid-template-columns: auto repeat(3, 1fr);
    gap: 5px;
    padding: 7px 9px;
  }
  /* 7 columns on a phone are too narrow for a £x.xx figure (it would clip to an
     ellipsis) — drop the per-cell cost and rely on the heat tint + tap-for-detail.
     The day number stays, and the detail panel shows exact kWh + cost. */
  .cal-grid {
    gap: 4px;
  }
  .cal-cell {
    min-height: 46px;
    padding: 5px;
  }
  .cal-cost {
    display: none;
  }
}

/* solar what-if screen */
.solar-input-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
}
.solar-advanced {
  border-top: 1px solid var(--border-soft);
  padding-top: 10px;
}
.solar-advanced > summary {
  cursor: pointer;
  font-size: var(--text-body-sm);
  font-weight: 600;
  color: var(--text-body);
  margin-bottom: 10px;
}
.solar-tiles {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px;
}
.solar-table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--text-body-sm);
}
.solar-table th,
.solar-table td {
  text-align: right;
  padding: 7px 10px;
  border-bottom: 1px solid var(--border-soft);
}
.solar-table th:first-child,
.solar-table td:first-child {
  text-align: left;
}
.solar-table thead th {
  color: var(--text-muted);
  font-weight: 600;
  font-size: var(--text-caption);
}</style>
</head>
<body>
<div id="app"></div>
</body>
